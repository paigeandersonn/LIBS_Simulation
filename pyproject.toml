[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "libssim"
version = "0.1.0"
description = "Open-source forward-modeling framework for LIBS plasma emission"
authors = [
    {name = "libssim contributors"}
]
dependencies = [
    "numpy>=1.20.0",
    "scipy>=1.7.0",
    "pyyaml>=6.0"
]
requires-python = ">=3.9"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]