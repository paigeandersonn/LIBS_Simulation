[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "libssim"
version = "0.1.0"
description = "Forward modeling framework for Laser-Induced Breakdown Spectroscopy"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["src"]           # ← Important: look inside src/
include = ["libssim*"]