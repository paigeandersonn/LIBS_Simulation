site_name: libssim

theme:
  name: material
  palette:
    primary: indigo

# README.md is for browsing docs/ on GitHub (conflicts with index.md);
# herrera_k.pdf is the dissertation scan — keep it out of the built site.
exclude_docs: |
  README.md
  herrera_k.pdf

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            docstring_style: numpy

nav:
  - Home: index.md
  - API Reference: reference.md
  - Project Docs:
      - Project Goal: project_goal.md
      - Development Rules: development_rules.md
      - Implementation Plan: implementation_plan.md
      - Architecture: architecture.md
      - Validation Strategy: validation_strategy.md
      - AI Instructions: ai_instructions.md
